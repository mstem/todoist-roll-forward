name: Roll Forward Tasks

on:
  schedule:
    - cron: '2 23 * * *'  # 12:02 AM WET (UTC+1 summer / WEST)
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  roll-forward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run roll-forward
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python3 rollforward.py
